name: studentsynchsa
description: "StudentSynchSA - Your university application companion"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  connectivity_plus: ^6.1.2
  google_sign_in: ^6.2.2
  flutter_secure_storage: ^9.2.4
  flutter_local_notifications: ^18.0.1
  uuid: ^4.5.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
    - assets/icons/
